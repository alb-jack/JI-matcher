<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResuMatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">ResuMatch</h1>
        <div class ="card p-4">
            <textarea id="job_description" class="form-control mb-3" rows="12" placeholder="Paste job description here..."></textarea>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="force_cover_letter">
                <label class="form-check-label" for="force_cover_letter">Force cover letter generation</label>
            </div>
            <button type="button" id="viewResults" class="btn btn-outline-light w-100 mb-2" style="display:none">View Last Results</button>
            <button type="button" id="submit" class="btn btn-success w-100">Analyze</button>
        </div>
    </div>

    <div class="modal fade" id="resultsModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Analysis Results</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="display"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const button = document.getElementById('submit')
    const viewResults = document.getElementById('viewResults')

    viewResults.addEventListener('click', () => {
        const modal = new bootstrap.Modal(document.getElementById('resultsModal'))
        modal.show()
    })

    button.addEventListener('click', (event) => {
        event.preventDefault();

        const jobDescription = document.getElementById('job_description').value
        const forceCoverLetter = document.getElementById('force_cover_letter').checked

        if(!jobDescription.trim()){
            const toast = new bootstrap.Toast(document.getElementById('errorToast'))
            toast.show()
            return
        }

        button.disabled = true
        button.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Analyzing...'

        const formData = new FormData()
        formData.append("job_description", jobDescription)
        if(forceCoverLetter){
            formData.append('force_cover_letter', 'on')
        }
        fetch('/analyze', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("display").innerText = data.result
            const modal = new bootstrap.Modal(document.getElementById('resultsModal'))
            modal.show()
            viewResults.style.display = 'block'
        })
        .finally(() => {
            button.disabled = false
            button.innerHTML = 'Analyze'
        })
    })

</script>  
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="errorToast" class="toast align-items-center text-bg-danger border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body">
                Please paste a job description first.
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>  
</body>
</html>
