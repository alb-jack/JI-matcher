<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResuMatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">ResuMatch</h1>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <button type="button" id="toggleSidebar" class="btn btn-outline-light btn-sm">☰ History</button>
        </div>
        <div class="row">
            <div class="col-4" id="sidebarCol">
                <div class="card p-3">
                    <h5>History</h5>
                    <div id="historyList"></div>
                </div>
            </div>
            <div class="col-8" id="mainCol">
                <div class ="card p-4">
                    <div class="mb-3">
                        <label class="form-label">Upload Resume (PDF)</label>
                        <input type="file" class="form-control" id="resume" accept=".pdf">
                    </div>
                    <textarea id="job_description" class="form-control mb-3" rows="12" placeholder="Paste job description here..."></textarea>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="force_cover_letter">
                        <label class="form-check-label" for="force_cover_letter">Force cover letter generation</label>
                    </div>
                    <button type="button" id="viewResults" class="btn btn-outline-light w-100 mb-2" style="display:none">View Last Results</button>
                    <button type="button" id="submit" class="btn btn-success w-100">Analyze</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="resultsModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Analysis Results</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="display"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const button = document.getElementById('submit')
    const viewResults = document.getElementById('viewResults')
    const toggleSidebar = document.getElementById('toggleSidebar')
    let sidebarOpen = true
    
    const analysisHistory = []

    function addToHistory(jobDescription, result) {
        const timestamp = new Date().toLocaleDateString()
        const snippet = jobDescription.substring(0,40) + '...'
        analysisHistory.push({ timestamp, snippet, result})

        const historyList = document.getElementById('historyList')
        const item = document.createElement('div')
        item.className = 'history-item p-2 mb-2 rounded'
        item.style.cursor = 'pointer'

        item.innerHTML = `<small class="text-muted">${timestamp}</small><br>${snippet}`
        item.addEventListener('click', () => {
            document.getElementById('display').innerText = result
            const modal = new bootstrap.Modal(document.getElementById('resultsModal'))
            modal.show()
        })
        historyList.prepend(item)
    }

    viewResults.addEventListener('click', () => {
        const modal = new bootstrap.Modal(document.getElementById('resultsModal'))
        modal.show()
    })

    button.addEventListener('click', (event) => {
        event.preventDefault();

        const jobDescription = document.getElementById('job_description').value
        const forceCoverLetter = document.getElementById('force_cover_letter').checked
        const resumeFile = document.getElementById('resume').files[0]
        if (!resumeFile) {
            const toast = new bootstrap.Toast(document.getElementById('errorToast'))
            toast.show()
            return
        }

        if(!jobDescription.trim()){
            const toast = new bootstrap.Toast(document.getElementById('errorToast'))
            toast.show()
            return
        }

        button.disabled = true
        button.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Analyzing...'

        const formData = new FormData()
        formData.append("job_description", jobDescription)
        formData.append('resume', resumeFile)
        if(forceCoverLetter){
            formData.append('force_cover_letter', 'on')
        }
        fetch('/analyze', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("display").innerText = data.result
            const modal = new bootstrap.Modal(document.getElementById('resultsModal'))
            modal.show()
            viewResults.style.display = 'block'
            addToHistory(jobDescription, data.result)
        })
        .finally(() => {
            button.disabled = false
            button.innerHTML = 'Analyze'
        })
    })
    toggleSidebar.addEventListener('click', () => {
        const sidebar = document.getElementById('sidebarCol')
        const main = document.getElementById('mainCol')

        if(sidebarOpen){
            sidebar.style.display = 'none'
            main.className = 'col-12'
            toggleSidebar.innerHTML = '☰ History'
        } else {
            sidebar.style.display = 'block'
            main.className = 'col-8'
            toggleSidebar.innerHTML = '✕ History'
        }
        sidebarOpen = !sidebarOpen
    })

</script>  
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="errorToast" class="toast align-items-center text-bg-danger border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body">
                Please fill in all fields before analyzing.
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>  
</body>
</html>
